paths:
  /api/v1/access-points/{id}:
    delete:
      consumes:
      - application/json
      description: PATCH edita parcialmente. DELETE elimina. (solo admin)
      parameters:
      - description: ID del access point
        in: path
        name: id
        required: true
        type: integer
      - description: Patch access point (solo PATCH, admin)
        in: body
        name: body
        schema:
          $ref: '#/definitions/handlers.patchAccessPointRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AccessPointDetailDTO'
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Editar o eliminar acceso
      tags:
      - Access Points
    patch:
      consumes:
      - application/json
      description: PATCH edita parcialmente. DELETE elimina. (solo admin)
      parameters:
      - description: ID del access point
        in: path
        name: id
        required: true
        type: integer
      - description: Patch access point (solo PATCH, admin)
        in: body
